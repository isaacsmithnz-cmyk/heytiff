.fg .dtab { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:8px; border-radius:12px; font-size:13px; font-weight:800; color:var(--gray500); text-transform:capitalize; transition:all .3s; }
.fg .dtab.on { background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08); }
.fg .dtab .dc { font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px; font-family:var(--mono); background:#e5e7eb; color:var(--gray400); }
.fg .dtab.on .dc { background:rgba(0,229,192,.15); color:var(--teal-d); }
.fg .droom { display:flex; align-items:center; gap:12px; padding:14px; border-radius:16px; background:#f9fafb; border:1px solid #f3f4f6; cursor:pointer; transition:all .2s; }
.fg .droom + .droom { margin-top:8px; }
.fg .droom:hover { border-color:rgba(0,229,192,.4); background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.05); }
.fg .droom .ri { width:36px; height:36px; border-radius:12px; background:rgba(0,229,192,.1); display:flex; align-items:center; justify-content:center; flex:0 0 auto; transition:transform .2s; }
.fg .droom:hover .ri { transform:scale(1.05); }
.fg .droom .ri svg { color:var(--teal-d); }
.fg .droom .rk { flex:1; min-width:0; }
.fg .droom .rk b { display:block; font-size:14px; font-weight:700; color:var(--ink); }
.fg .droom .rk em { font-style:normal; font-size:11px; font-weight:700; color:var(--gray400); font-family:var(--mono); }
.fg .droom .rkw { font-size:13px; font-weight:800; color:var(--teal-d); font-family:var(--mono); flex:0 0 auto; }
.fg .dview { position:absolute; bottom:24px; left:100px; display:flex; border-radius:12px; background:rgba(255,255,255,.8); backdrop-filter:blur(16px); border:1px solid #fff; box-shadow:0 8px 30px rgba(0,0,0,.05); overflow:hidden; z-index:20; animation:fgUp .5s .3s both; }
.fg .dview button { width:48px; height:48px; display:flex; align-items:center; justify-content:center; color:var(--gray700); transition:all .2s; }
.fg .dview button:hover { background:#fff; color:var(--teal); }
.fg .dview button:not(:last-child) { border-right:1px solid rgba(0,0,0,.08); }
.fg .dread { position:absolute; bottom:24px; right:380px; display:flex; gap:12px; pointer-events:none; z-index:20; animation:fgUp .5s .3s both; }
@media (max-width:1080px){ .fg .dread{right:24px} }
.fg .dread .rd { padding:8px 16px; border-radius:12px; background:rgba(255,255,255,.8); backdrop-filter:blur(16px); border:1px solid #fff; font-size:13px; font-weight:800; font-family:var(--mono); color:var(--gray500); box-shadow:0 8px 30px rgba(0,0,0,.05); }

/* SVG plan animations */
.fg .plan .pl-line { stroke-dasharray:1; stroke-dashoffset:1; animation:fgDraw .9s ease-in-out forwards; opacity:0; }
@keyframes fgDraw { from{stroke-dashoffset:1;opacity:0} 10%{opacity:.45} to{stroke-dashoffset:0;opacity:.45} }
.fg .plan .pl-flow { stroke-dasharray:6 60; opacity:0; animation:fgFlow 2.4s linear infinite; }
@keyframes fgFlow { 0%{opacity:0;stroke-dashoffset:0} 20%{opacity:1} 80%{opacity:1} 100%{opacity:0;stroke-dashoffset:-132} }
.fg .plan .pl-room { opacity:0; transform:scale(.96); transform-box:fill-box; transform-origin:center; animation:fgRoom .5s ease-out forwards; }
@keyframes fgRoom { to{opacity:1;transform:scale(1)} }
.fg .plan .pl-unit { opacity:0; transform:scale(0); transform-box:fill-box; transform-origin:center; animation:fgUnit .6s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes fgUnit { to{opacity:1;transform:scale(1)} }
.fg .plan .pl-ring { transform-box:fill-box; transform-origin:center; animation:fgUnitRing 2s ease-out infinite; }
@keyframes fgUnitRing { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(1.8);opacity:0} }
.fg .plan .pl-fan { transform-box:fill-box; transform-origin:center; animation:fgFan 3s linear infinite; }
@keyframes fgFan { to{transform:rotate(360deg)} }

@media (prefers-reduced-motion: reduce) {
  .fg * { animation-duration:.001s !important; }
}

<div class="fg">
  <div class="gridbg"></div>
  <div id="fg-side"></div>
  <div class="main">
    <div id="fg-top"></div>
    <main class="outlet"><div class="page in" id="fg-page"></div></main>
  </div>
</div>

<div class="fg-cmd" id="fg-cmd">
  <div class="ov" data-close=""></div>
  <div class="box">
    <div class="glow"></div>
    <div class="cin"><span class="ci"></span><input id="fg-cmd-in" placeholder="Search screens, tools, or actions..." autocomplete="off"><kbd class="esc">ESC</kbd></div>
    <div class="clist no-sb" id="fg-cmd-list"></div>
    <div class="cfoot"><div class="cf-l"></div><div class="cf-r"></div></div>
  </div>
</div>



<style>
  .fg-cmd { position:fixed; inset:0; z-index:100; display:none; align-items:flex-start; justify-content:center; padding-top:15vh; font-family:'Plus Jakarta Sans',sans-serif; }
  .fg-cmd.open { display:flex; }
  .fg-cmd .ov { position:absolute; inset:0; background:rgba(5,5,5,.4); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); animation:fgcFade .2s both; }
  @keyframes fgcFade { from{opacity:0} to{opacity:1} }
  .fg-cmd .box { position:relative; width:640px; max-width:calc(100vw - 32px); border-radius:28px; overflow:hidden; background:rgba(255,255,255,.9); backdrop-filter:blur(24px) saturate(1.6); -webkit-backdrop-filter:blur(24px) saturate(1.6); border:1px solid #fff; box-shadow:0 30px 80px -20px rgba(0,0,0,.4); animation:fgcIn .3s cubic-bezier(.34,1.4,.5,1) both; }
  @keyframes fgcIn { from{opacity:0;transform:scale(.96) translateY(-8px)} to{opacity:1;transform:none} }
  .fg-cmd .box .glow { position:absolute; top:-80px; left:50%; transform:translateX(-50%); width:300px; height:160px; background:#00E5C0; filter:blur(100px); opacity:.2; pointer-events:none; }
  .fg-cmd .cin { position:relative; display:flex; align-items:center; gap:16px; padding:20px 24px; border-bottom:1px solid #f3f4f6; }
  .fg-cmd .cin .ci { color:#9ca3af; display:flex; }
  .fg-cmd .cin input { flex:1; background:none; border:none; outline:none; font-size:17px; font-weight:500; color:#1f2937; font-family:inherit; }
  .fg-cmd .cin input::placeholder { color:#9ca3af; }
  .fg-cmd .esc { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; color:#9ca3af; background:#f3f4f6; padding:4px 8px; border-radius:6px; }
  .fg-cmd .clist { max-height:380px; overflow-y:auto; padding:12px; }
  .fg-cmd .cgl { padding:8px 16px; font-size:10px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; color:#9ca3af; }
  .fg-cmd .crow { position:relative; width:100%; display:flex; align-items:center; gap:16px; padding:12px 16px; border-radius:16px; cursor:pointer; text-align:left; }
  .fg-cmd .crow.on { background:rgba(243,244,246,.8); }
  .fg-cmd .crow .ci2 { width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; transition:transform .3s; }
  .fg-cmd .crow.on .ci2 { transform:scale(1.05); }
  .fg-cmd .crow .ck { flex:1; min-width:0; }
  .fg-cmd .crow .ck b { display:block; font-size:15px; font-weight:700; color:#050505; }
  .fg-cmd .crow .ck em { font-style:normal; display:block; font-size:12px; font-weight:500; color:#9ca3af; }
  .fg-cmd .crow .cen { color:#9ca3af; opacity:0; }
  .fg-cmd .crow.on .cen { opacity:1; }
  .fg-cmd .cempty { padding:48px 16px; text-align:center; }
  .fg-cmd .cempty b { display:block; font-size:15px; font-weight:700; color:#9ca3af; }
  .fg-cmd .cempty em { font-style:normal; font-size:13px; color:#d1d5db; margin-top:4px; }
  .fg-cmd .cfoot { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-top:1px solid #f3f4f6; background:rgba(249,250,251,.5); }
  .fg-cmd .cf-l { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; color:#9ca3af; }
  .fg-cmd .cf-r { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:#9ca3af; }
</style>

<script src="c1f3fc7e-d30e-4fd7-8e26-eadb747f9a0a"></script>

<script src="5eb69039-88af-4adb-bba1-9fad6563f951"></script>
<script>
(function () {
  const I = window.FGI, side = document.getElementById('fg-side'), top = document.getElementById('fg-top'), page = document.getElementById('fg-page');

  function runAnims() {
    page.querySelectorAll('.odu .bar i').forEach(b => { requestAnimationFrame(() => { b.style.width = (b.dataset.w || 0) + '%'; }); });
  }

  let current = '';
  function render(key) {
    const fn = window.FG3_SCREENS[key] || window.FG3_SCREENS.home;
    const swap = () => {
      current = key;
      side.innerHTML = window.FG3_SIDEBAR(key);
      if (!top.innerHTML) top.innerHTML = window.FG3_TOPBAR();
      document.getElementById('fg-topbar').classList.remove('hide');
      page.classList.remove('out');
      page.innerHTML = fn();
      page.classList.remove('in'); void page.offsetWidth; page.classList.add('in');
      page.scrollTop = 0;
      runAnims();
      clearTimeout(page._t); page._t = setTimeout(() => page.classList.remove('in'), 480);
    };
    if (current && current !== key) { page.classList.add('out'); setTimeout(swap, 220); } else swap();
  }

  document.querySelector('.fg').addEventListener('click', (e) => {
    const nav = e.target.closest('[data-nav]');
    if (nav) { if (nav.dataset.nav !== current) render(nav.dataset.nav); return; }
    if (e.target.closest('[data-cmd]')) openCmd();
    const tab = e.target.closest('.dtab'); if (tab) { tab.parentElement.querySelectorAll('.dtab').forEach(t => t.classList.remove('on')); tab.classList.add('on'); }
    const dt = e.target.closest('.dtbtn'); if (dt) { dt.parentElement.querySelectorAll('.dtbtn').forEach(t => t.classList.remove('active')); dt.classList.add('active'); }
    const st = e.target.closest('.dstep'); if (st) { st.parentElement.querySelectorAll('.dstep').forEach(t => t.classList.remove('active')); st.classList.add('active'); }
  });
  document.querySelector('.fg').addEventListener('mousemove', (e) => {
    const c = e.target.closest('.spot'); if (!c) return;
    const r = c.getBoundingClientRect();
    c.style.setProperty('--mx', (e.clientX - r.left) + 'px'); c.style.setProperty('--my', (e.clientY - r.top) + 'px');
  });

  // command palette built from the flat NAV
  const cmd = document.getElementById('fg-cmd'), cin = document.getElementById('fg-cmd-in'), clist = document.getElementById('fg-cmd-list');
  const HINT = { home:'Workspace landing', toolbox:'Calculators & references', people:'People & their day', ductr:'VRF design canvas', tiff:'Assistant & knowledge base', admin:'Owner, financial & compliance' };
  const ACC = { home:'#00E5C0', toolbox:'#8A2BE2', people:'#00A389', ductr:'#FF8A00', tiff:'#2E68FF', admin:'#FF3366' };
  const CMDS = window.FG3_NAV.map(n => ({ id:n[0], label:n[1], hint:HINT[n[0]], icon:n[2], accent:ACC[n[0]] }));
  let flat = [], sel = 0;
  function buildCmd(q) {
    q = (q || '').trim().toLowerCase();
    const items = CMDS.filter(c => !q || (c.label + ' ' + c.hint).toLowerCase().includes(q));
    flat = items;
    if (!items.length) { clist.innerHTML = '<div class="cempty"><b>No results for "' + q + '"</b><em>Try "team", "design", or "admin"</em></div>'; return; }
    let html = '<div class="cgl">Navigate</div>';
    items.forEach(c => { const idx = flat.indexOf(c);
      html += '<button class="crow' + (idx===sel?' on':'') + '" data-i="' + idx + '"><span class="ci2" style="background:' + c.accent + '15"><span style="color:' + c.accent + ';display:flex">' + I(c.icon,17) + '</span></span>' +
        '<span class="ck"><b>' + c.label + '</b><em>' + c.hint + '</em></span><span class="cen">' + I('cornerDL',14) + '</span></button>';
    });
    clist.innerHTML = html;
  }
  function openCmd() { cmd.classList.add('open'); cin.value = ''; sel = 0; buildCmd(''); setTimeout(() => cin.focus(), 40); }
  function closeCmd() { cmd.classList.remove('open'); }
  function runCmd(c) { closeCmd(); render(c.id); }
  function paint() { [...clist.querySelectorAll('.crow')].forEach(r => r.classList.toggle('on', +r.dataset.i === sel)); }
  cin.addEventListener('input', () => { sel = 0; buildCmd(cin.value); });
  clist.addEventListener('click', (e) => { const r = e.target.closest('[data-i]'); if (r) runCmd(flat[+r.dataset.i]); });
  clist.addEventListener('mousemove', (e) => { const r = e.target.closest('[data-i]'); if (r && +r.dataset.i !== sel) { sel = +r.dataset.i; paint(); } });
  cmd.addEventListener('click', (e) => { if (e.target.hasAttribute('data-close')) closeCmd(); });
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); cmd.classList.contains('open') ? closeCmd() : openCmd(); return; }
    if (!cmd.classList.contains('open')) return;
    if (e.key === 'Escape') { e.preventDefault(); closeCmd(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); if (flat.length) { sel = (sel+1)%flat.length; paint(); } }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if (flat.length) { sel = (sel-1+flat.length)%flat.length; paint(); } }
    else if (e.key === 'Enter') { e.preventDefault(); if (flat[sel]) runCmd(flat[sel]); }
  });

  document.querySelector('#fg-cmd .ci').innerHTML = I('search',20);
  document.querySelector('#fg-cmd .cf-l').innerHTML = '<span style="display:flex">' + I('arrowUp',9) + I('arrowDown',9) + '</span> Navigate \u00b7 <span style="display:flex">' + I('cornerDL',9) + '</span> Select';
  document.querySelector('#fg-cmd .cf-r').innerHTML = '<span style="color:#00E5C0;display:flex">' + I('sparkles',12) + '</span> HeyTiff Command';

  render('home');
})();
</script>
